<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>時間紀錄</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F5F2ED" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="時間紀錄">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app" style="display:none">
  <header>
    <div class="week-nav">
      <button id="prevWeek" aria-label="上一週">←</button>
      <span id="weekRange"></span>
      <button id="nextWeek" aria-label="下一週">→</button>
    </div>
  </header>

  <main id="weekBody"></main>

  <footer id="addBar">
    <div id="minDrawer">
      <div class="min-scroll" id="minScroll"></div>
    </div>
    <input type="text" id="nameIn" placeholder="項目" autocomplete="off">
    <div id="minTrigger" role="button" tabindex="0" aria-label="選擇分鐘">
      <span class="placeholder">分</span>
    </div>
    <button id="addBtn" aria-label="新增">+</button>
  </footer>
</div>

<div id="toast"></div>

<!-- Service Worker 註冊 + 自動更新 -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js', { scope: './' }).then(reg => {

        // 偵測到新版本時，自動 skipWaiting 並重新整理
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // 有新版本已安裝 → 發訊息要求立即接管
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });

        // SW 控制權切換後，自動重新整理頁面載入新版本
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });

        // 每次頁面可見時主動檢查更新
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            reg.update();
          }
        });

      }).catch(err => console.warn('SW 註冊失敗：', err));
    });
  }
</script>

<!-- Firebase -->
<script type="module" src="app.js"></script>
</body>
</html>
